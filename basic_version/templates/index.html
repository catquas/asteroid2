<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Basic Version</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js" defer></script>
    <script src="/static/app.js" defer></script>
  </head>
  <body>
    <main>
      <h1>Basic Version</h1>

      <section class="chart-section">
        <h2>Time Series</h2>
        <div class="chart-wrap">
          <canvas id="time-series-chart"></canvas>
        </div>
        {# Chart.js reads this JSON payload from app.js. #}
        <script id="line-graph-data" type="application/json">{{ line_graph | tojson }}</script>
      </section>

      <section class="table-section">
        <h2>Sum by UI</h2>
        <table class="ui-table">
          <thead>
            <tr>
              <th class="expand-cell"></th>
              {% for column in ui_columns %}
                <th>{{ column }}</th>
              {% endfor %}
            </tr>
          </thead>
          <tbody>
            {% for row in ui_rows %}
              <tr class="ui-summary-row" data-ui-row="{{ row.ui }}">
                <td class="expand-cell">
                  {% if row.report_count > 1 %}
                    <button
                      type="button"
                      class="expand-button"
                      data-toggle-details
                      data-row-ui="{{ row.ui }}"
                      aria-expanded="false"
                    ><span class="expand-icon">+</span></button>
                  {% endif %}
                </td>
                {% for column in ui_columns %}
                  <td>{{ row[column] }}</td>
                {% endfor %}
              </tr>
            {% endfor %}
          </tbody>
        </table>
      </section>
    </main>
  </body>
</html>
