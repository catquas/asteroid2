{# Detail <tr> fragments for one expanded ui, inserted after its summary row. #}
{% for row in detail_rows %}
  <tr class="ui-detail-row" data-detail-row="{{ ui }}">
    <td class="expand-cell"></td>
    <td class="detail-report">{{ ui }}-{{ row.report }}</td>
    <td></td>
    <td>{{ row.pm }}</td>
    <td>{{ row.cm }}</td>
    <td>{{ row.otm }}</td>
  </tr>
{% endfor %}
